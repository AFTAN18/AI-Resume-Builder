name: ai-resume-builder
framework: react
build:
  command: npm run build
  output: dist
env:
  VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
routes:
  - src: /api/*
    dest: ${{ secrets.SUPABASE_URL }}/functions/v1/*
  - src: /*
    dest: /index.html
headers:
  - src: /assets/*
    headers:
      Cache-Control: "public, max-age=31536000, immutable"
  - src: /*
    headers:
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      Referrer-Policy: strict-origin-when-cross-origin
      Content-Security-Policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co"
